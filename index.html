<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Carlos Antonio de Oliveira Piquet">
  <title>Suite Acadêmica Piquet</title>
  <link rel="stylesheet" href="suite.css?v=20260709-office-menu2">
  <script defer src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script defer src="suite.js?v=20260709-office-menu2"></script>
</head>
<body>
  <div class="suite-shell">
    <header class="suite-topbar">
      <div class="suite-topbar-main">
        <button type="button" class="suite-icon-btn menu-toggle" id="menuToggleBtn" aria-label="Abrir menu de ferramentas" aria-controls="toolDrawer" aria-expanded="false">
          <i data-lucide="menu"></i>
        </button>
        <div class="suite-brand">
          <div class="brand-mark" aria-hidden="true">SP</div>
          <div>
            <h1>Suite Acadêmica Piquet</h1>
            <p id="suiteStatus">Presença Moodle carregada</p>
          </div>
        </div>
      </div>
      <div class="suite-actions">
        <button type="button" class="suite-btn ghost" id="reloadToolBtn" title="Recarregar ferramenta">
          <i data-lucide="refresh-cw"></i>
          <span>Recarregar</span>
        </button>
        <button type="button" class="suite-btn primary" id="openToolBtn" title="Abrir ferramenta em nova aba">
          <i data-lucide="external-link"></i>
          <span>Abrir</span>
        </button>
      </div>
    </header>

    <main class="suite-layout">
      <button type="button" class="drawer-backdrop" id="drawerBackdrop" aria-label="Fechar menu de ferramentas" hidden></button>

      <aside class="suite-sidebar" id="toolDrawer" aria-label="Ferramentas" aria-hidden="true" inert>
        <div class="drawer-head">
          <strong>Ferramentas</strong>
          <button type="button" class="suite-icon-btn" id="menuCloseBtn" aria-label="Fechar menu de ferramentas">
            <i data-lucide="x"></i>
          </button>
        </div>

        <label class="tool-search">
          <i data-lucide="search"></i>
          <input id="toolSearchInput" type="search" placeholder="Buscar ferramenta">
        </label>

        <nav class="tool-nav" id="toolNav">
          <button type="button" class="tool-item active" data-tool="presenca" data-keywords="presenca moodle chamada csv pdf aula modulo notas frequencia">
            <i data-lucide="clipboard-check"></i>
            <span>Presença Moodle</span>
            <small>CSV, ZIP e PDF</small>
          </button>
          <button type="button" class="tool-item" data-tool="calendario" data-keywords="calendario feriados modulo carga horaria pdf tabela">
            <i data-lucide="calendar-days"></i>
            <span>Calendário</span>
            <small>Agenda acadêmica</small>
          </button>
          <button type="button" class="tool-item" data-tool="organizador" data-keywords="organizador zip compactador alunos documentos moodle relatorio logs">
            <i data-lucide="archive"></i>
            <span>Organizador</span>
            <small>ZIP e conversores</small>
          </button>
        </nav>
        <div class="tool-empty" id="toolEmpty" hidden>Nenhuma ferramenta encontrada</div>
      </aside>

      <section class="tool-stage">
        <div class="frame-shell">
          <iframe id="toolFrame" title="Ferramenta ativa" src="presenca.html" allow="clipboard-read; clipboard-write; fullscreen"></iframe>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
